# 제안서 부록 C ― settings.yaml 전체 스키마
# 핵심 원칙 ②: 실행 모드(dry_run/paper/live) 전환은 이 파일 1곳에서만 수행

runtime:
  mode: paper              # dry_run | paper | live (전환은 이곳 1곳)
  poll_interval_sec: 5
  market: KRX              # KRX | US

universe:
  - { code: "005930", strategy: "sma_cross" }   # 삼성전자
  - { code: "069500", strategy: "sma_cross" }   # KODEX 200 (ETF)
  # 주의: ETF는 매도 시 증권거래세 면제 ― 현재 비용 모델은 전 종목에
  # 거래세(0.0015)를 일괄 적용하므로 ETF 매도 수취액이 실제보다 낮게
  # 추정됨(보수적 방향). 정밀화는 G4 실체결 대사 시 종목유형별로 반영 예정

strategies:
  sma_cross:
    stock_code: "005930"
    short_window: 5
    long_window: 20
    qty: 1

limits:
  daily_loss_limit: 200000    # 금액 기준 (구현과 일치 필수)
  max_order_amount: 1000000
  max_position_pct: 20.0
  max_concurrent: 5
  open_order_timeout_min: 10

sizing:
  model: fixed_fraction       # fixed_fraction | volatility_target
  fraction_pct: 5.0

alerts:
  channel: telegram           # telegram | email

logging:
  level: INFO
  db_url: "sqlite:///data/trade.db"
